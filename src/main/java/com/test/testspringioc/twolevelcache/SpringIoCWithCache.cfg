\* 1. 声明系统的入口规约 (Specification)
\* 这里对应 .tla 文件中的 Spec == Init /\ [][Next]_vars /\ Fairness
SPECIFICATION Spec

\* 2. 运行时不变式检查 (Invariants)
\* TLC 会在每一个步骤之后验证这些条件是否依然为真。
\* 如果 TypeOK 报错，说明你的逻辑产生了非法状态（如状态值超出了预设集合）。
INVARIANT TypeOK

\* 3. 终极性能指标：活性属性 (Properties)
\* 这是测试的核心！它会强制 TLC 搜索是否存在任何一个依赖组合，
\* 导致系统无法达到“全员初始化”的终局。
PROPERTY AllInitialized

\* 4. (可选) 状态空间约束
\* 如果你后续增加了 Bean 的数量导致状态爆炸，可以在这里限制搜索深度。
\* 对于 3 个 Bean 的 512 种组合，不需要限制，M4 Pro 秒杀。
\* CONSTRAINT StateConstraint